spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: catalog-service-route
          uri: lb://catalog-service
          predicates:
            - Path=/api/catalog/**
          filters:
            - StripPrefix=2
        - id: lending-service-route
          uri: lb://lending-service
          predicates:
            - Path=/api/lending/**
          filters:
            - StripPrefix=2
        - id: member-service-route
          uri: lb://member-service
          predicates:
            - Path=/api/member/**
          filters:
            - StripPrefix=2
        - id: notification-service-route
          uri: lb://notification-service
          predicates:
            - Path=/api/notification/**
          filters:
            - StripPrefix=2
        # Backwards compatibility routes
        - id: legacy-auth-route
          uri: lb://member-service
          predicates:
            - Path=/auth/**
        - id: legacy-books-route
          uri: lb://catalog-service
          predicates:
            - Path=/books/**
        - id: legacy-lending-route
          uri: lb://lending-service
          predicates:
            - Path=/lending/**

auth:
  jwt:
    secret: "scholario-secret-key-2026-very-secure"
