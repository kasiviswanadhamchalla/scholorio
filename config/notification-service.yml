server:
  port: 8089

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/scholario_notification?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: scholario
    password: Scholario@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  graphql:
    path: /graphql
    schema:
      locations: "classpath*:graphql/**/"

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/scholario}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: java.util.Map
        spring.json.trusted.packages: "*"

scholario:
  security:
    keycloak:
      enabled: ${KEYCLOAK_ENABLED:true}

auth:
  jwt:
    secret: "scholario-secret-key-2026-very-secure"
